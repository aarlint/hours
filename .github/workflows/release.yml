name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.name }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: hours-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: hours-darwin-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: hours-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: hours-linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            name: hours-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend (required for go:embed)
        working-directory: internal/web
        run: |
          npm ci || npm install
          npm run build

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goos == 'linux' && matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          go mod download
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.name }} .

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: ${{ matrix.name }}

  build-app:
    name: Build macOS App (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: arm64
            platform: darwin/arm64
            zipname: Hours-darwin-arm64.zip
          - arch: amd64
            platform: darwin/amd64
            zipname: Hours-darwin-amd64.zip
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: internal/web
        run: npm ci || npm install

      - name: Build frontend
        working-directory: internal/web
        run: npm run build

      - name: Build Hours.app
        run: |
          $(go env GOPATH)/bin/wails build -clean -platform ${{ matrix.platform }} \
            -ldflags="-X main.version=${{ github.ref_name }}"

      - name: Zip app bundle
        run: |
          cd build/bin
          ditto -c -k --keepParent Hours.app ../../${{ matrix.zipname }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.arch }}
          path: ${{ matrix.zipname }}

  create-release:
    name: Create Release
    needs: [build-cli, build-app]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: ./artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Release notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Hours — Time tracking & invoicing

          ### macOS app

          | Architecture | Download |
          |---|---|
          | Apple Silicon (M1/M2/M3) | `Hours-darwin-arm64.zip` |
          | Intel | `Hours-darwin-amd64.zip` |

          Unzip and drag **Hours.app** into `/Applications` (or `~/Applications`).
          First launch: right-click → Open to bypass Gatekeeper for unsigned builds.

          The native app includes the full UI plus the MCP stdio server — point Claude Desktop at:

          ```json
          {
            "mcpServers": {
              "hours": {
                "command": "/Applications/Hours.app/Contents/MacOS/Hours",
                "args": ["--mcp"]
              }
            }
          }
          ```

          ### Stdio-only CLI (headless MCP)

          Use these if you don't want the desktop UI.

          | Platform | Download |
          |---|---|
          | macOS (Apple Silicon) | `hours-darwin-arm64` |
          | macOS (Intel) | `hours-darwin-amd64` |
          | Linux (x86_64) | `hours-linux-amd64` |
          | Linux (ARM64) | `hours-linux-arm64` |
          | Windows (x86_64) | `hours-windows-amd64.exe` |

          ```bash
          chmod +x hours-*
          mv hours-* ~/.local/bin/hours
          ```

          Claude Desktop config:
          ```json
          {
            "mcpServers": {
              "hours": {
                "command": "/Users/YOUR_USERNAME/.local/bin/hours"
              }
            }
          }
          ```

          ### Documentation

          - [README](https://github.com/aarlint/hours/blob/main/README.md)
          EOF

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Hours ${{ steps.tag.outputs.tag }}"
          body_path: release_notes.md
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
